    <script>
      async function downloadVCard() {
        const response = await fetch("/images/profile-image.jpeg");
        const blob = await response.blob();

        const base64 = await new Promise((resolve) => {
          const reader = new FileReader();
          reader.onloadend = () => {
            resolve(reader.result.split(",")[1]); // Remove data:image/jpeg;base64,
          };
          reader.readAsDataURL(blob);
        });

        const vcard = `BEGIN:VCARD
VERSION:3.0
FN:Godfred Owusu
ORG:Hubfinance
TITLE:AI & Software Engineer
TEL;TYPE=CELL,VOICE:+33744274844
EMAIL;TYPE=PREF,INTERNET:godfred@hubfinance.com
URL:https://www.hubfinance.com
PHOTO;ENCODING=b;TYPE=JPEG:${base64}
END:VCARD`;

        const vcfBlob = new Blob([vcard], {
          type: "text/vcard;charset=utf-8",
        });

        const url = URL.createObjectURL(vcfBlob);

        const a = document.createElement("a");
        a.href = url;
        a.download = "John_Doe_Contact.vcf";

        document.body.appendChild(a);
        a.click();
        document.body.removeChild(a);

        URL.revokeObjectURL(url);
      }
    </script>
