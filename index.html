    <script>
      async function downloadVCard() {
        let base64Photo = "";

        try {
          const response = await fetch("./images/profile-image.jpeg");
          const blob = await response.blob();

          const base64Raw = await new Promise((resolve, reject) => {
            const reader = new FileReader();
            reader.onloadend = () => resolve(reader.result);
            reader.onerror = reject;
            reader.readAsDataURL(blob);
          });

          // Isolate raw data and break chunks into max 72 character lines for standard vCard spec parsing
          const cleanRaw = base64Raw.split(",")[1];
          base64Photo = cleanRaw.match(/.{1,72}/g).join("\r\n ");
        } catch (error) {
          console.warn(
            "Could not load profile image for vCard, generating text-only file instead.",
            error,
          );
        }

        // Formulate vCard template block
        const vcard = [
          "BEGIN:VCARD",
          "VERSION:3.0",
          "FN:Godfred Owusu",
          "ORG:Hubfinance",
          "TITLE:AI & Software Engineer",
          "TEL;TYPE=CELL,VOICE:+33744274844",
          "EMAIL;TYPE=PREF,INTERNET:godfredmirekuowusu@gmail.com",
          "URL:https://www.hubfinance.com/en/",
          base64Photo ? `PHOTO;ENCODING=b;TYPE=JPEG:\r\n ${base64Photo}` : "",
          "END:VCARD",
        ]
          .filter(Boolean)
          .join("\r\n");

        const vcfBlob = new Blob([vcard], {
          type: "text/vcard;charset=utf-8",
        });

        const url = URL.createObjectURL(vcfBlob);
        const a = document.createElement("a");
        a.href = url;
        a.download = "Godfred_Owusu_Contact.vcf";

        document.body.appendChild(a);
        a.click();
        document.body.removeChild(a);

        URL.revokeObjectURL(url);
      }
    </script>
